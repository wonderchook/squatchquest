const TOTAL_STOPS = STOPS.length;

// ============ STATE MANAGEMENT ============
// Persist progress in localStorage so it survives between QR scans
const STORAGE_KEY = 'pnw_wilds_hunt_2026';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return { completed: {}, unlocked: {}, teamName: '', teamSize: '', submitted: false };
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

let state = loadState();

// Check URL params
function getStopFromURL() {
  const params = new URLSearchParams(window.location.search);
  return parseInt(params.get('stop')) || null;
}

function getKeyFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get('key') || null;
}

function isUnlocked(stopId) {
  return !!state.unlocked[stopId];
}

function getCompletedCount() {
  return Object.keys(state.completed).length;
}

// ============ CONFETTI ============
function launchConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);

  const colors = ['#f0b8c8', '#9b7cb8', '#7cb87c', '#ffcc80', '#81d4fa', '#fff176'];
  const shapes = ['\ud83e\uddb6', '\ud83c\udf32', '\u2b50', '\ud83c\udf1f', '\ud83d\udc3e'];

  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.animationDuration = (2 + Math.random() * 3) + 's';
    piece.style.animationDelay = Math.random() * 1.5 + 's';

    if (Math.random() > 0.5) {
      piece.textContent = shapes[Math.floor(Math.random() * shapes.length)];
      piece.style.fontSize = '20px';
      piece.style.background = 'none';
    } else {
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      piece.style.width = (6 + Math.random() * 10) + 'px';
      piece.style.height = (6 + Math.random() * 10) + 'px';
    }

    container.appendChild(piece);
  }

  setTimeout(() => container.remove(), 5000);
}

// ============ RENDERING ============
const app = document.getElementById('app');

function render() {
  const stopId = getStopFromURL();
  const urlKey = getKeyFromURL();

  // If arriving with a valid key, unlock this stop
  if (stopId && urlKey) {
    const stop = STOPS.find(s => s.id === stopId);
    if (stop && stop.key === urlKey) {
      if (!state.unlocked) state.unlocked = {};
      state.unlocked[stopId] = true;
      saveState();
    }
  }

  // Ensure unlocked exists for older saved states
  if (!state.unlocked) { state.unlocked = {}; saveState(); }

  if (state.submitted) {
    renderThankYou();
  } else if (stopId && isUnlocked(stopId)) {
    renderStop(stopId);
  } else if (stopId) {
    renderLocked(stopId);
  } else {
    renderHub();
  }
}

function handleAnswer(stopId, selectedIdx) {
  const stop = STOPS.find(s => s.id === stopId);
  const buttons = document.querySelectorAll(`[data-stop="${stopId}"]`);
  const resultDiv = document.getElementById(`result-${stopId}`);

  // Disable all buttons
  buttons.forEach(btn => {
    btn.disabled = true;
    btn.style.pointerEvents = 'none';
  });

  const isCorrect = selectedIdx === stop.correct;

  // Highlight selected
  buttons[selectedIdx].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    buttons[stop.correct].classList.add('correct');
  }

  // Mark as completed regardless of answer (it's for fun!)
  state.completed[stopId] = true;
  saveState();

  const visitLink = stop.website ? `<div style="margin-top:8px;"><a href="${stop.website}" target="_blank" rel="noopener" style="color:#7b5ea7; font-weight:600; font-size:0.9rem;">🌐 Visit ${stop.name}</a></div>` : '';

  if (isCorrect) {

    resultDiv.innerHTML = `
      <div class="result-msg correct">
        \ud83c\udf1f Correct! Bigfoot approves! \ud83e\uddb6
        <div class="fun-fact">${stop.funFact}</div>
        ${visitLink}
      </div>
      <div style="text-align:center">
        <button class="nav-btn" aria-label="Continue adventure, ${getCompletedCount()} of ${TOTAL_STOPS} stops completed" onclick="window.location='?'">\ud83d\uddfa\ufe0f Continue Adventure (${getCompletedCount()}/${TOTAL_STOPS})</button>
      </div>
    `;
    launchConfetti();
  } else {
    resultDiv.innerHTML = `
      <div class="result-msg wrong">
        \ud83d\ude04 Nice try! The answer was <strong>${String.fromCharCode(65 + stop.correct)}</strong> \u2014 but Bigfoot still gives you credit for showing up!
        <div class="fun-fact">${stop.funFact}</div>
        ${visitLink}
      </div>
      <div style="text-align:center">
        <button class="nav-btn" aria-label="Continue adventure, ${getCompletedCount()} of ${TOTAL_STOPS} stops completed" onclick="window.location='?'">\ud83d\uddfa\ufe0f Continue Adventure (${getCompletedCount()}/${TOTAL_STOPS})</button>
      </div>
    `;
  }
}
