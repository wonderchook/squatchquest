// 3. Fill in below:
const GOOGLE_FORM_URL = ''; // e.g. 'https://docs.google.com/forms/d/e/XXXXX/formResponse'

  teamName: '',    // e.g. 'entry.123456'
  teamSize: '',    // e.g. 'entry.234567'
  email: '',       // e.g. 'entry.345678'
  phone: '',       // e.g. 'entry.456789'
  favorite: '',    // e.g. 'entry.567890'
  completedAt: '', // e.g. 'entry.678901'
  score: '',       // e.g. 'entry.789012'
};

function submitToGoogleForm() {
  const formData = new URLSearchParams();
  if (FORM_FIELDS.teamName) formData.append(FORM_FIELDS.teamName, state.teamName);
  if (FORM_FIELDS.teamSize) formData.append(FORM_FIELDS.teamSize, state.teamSize);
  if (FORM_FIELDS.email) formData.append(FORM_FIELDS.email, state.email || '');
  if (FORM_FIELDS.phone) formData.append(FORM_FIELDS.phone, state.phone || '');
  if (FORM_FIELDS.favorite) formData.append(FORM_FIELDS.favorite, state.favorite || '');
  if (FORM_FIELDS.completedAt) formData.append(FORM_FIELDS.completedAt, state.completedAt || new Date().toISOString());
  if (FORM_FIELDS.score) formData.append(FORM_FIELDS.score, `${getCompletedCount()}/${TOTAL_STOPS}`);

  // Fire-and-forget POST (Google Forms doesn't support CORS, so we use no-cors)
  fetch(GOOGLE_FORM_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: formData.toString()
  }).catch(() => {
    // Silently fail — the confirmation screen still shows

  });
}

const TOTAL_STOPS = STOPS.length;

// ============ STATE MANAGEMENT ============
const STORAGE_KEY = 'squatchquest_state';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch (e) { /* localStorage unavailable */ }
  return { completed: {}, teamName: '', teamSize: '', submitted: false };
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) { /* localStorage unavailable */ }
}

let state = loadState();

// Check URL params
function getStopFromURL() {
  const params = new URLSearchParams(window.location.search);
  return parseInt(params.get('stop')) || null;
}

function getCompletedCount() {
  return Object.keys(state.completed).length;
}

// ============ CONFETTI ============
function launchConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);

  const colors = ['#f0b8c8', '#9b7cb8', '#7cb87c', '#ffcc80', '#81d4fa', '#fff176'];
  const shapes = ['\ud83e\uddb6', '\ud83c\udf32', '\u2b50', '\ud83c\udf1f', '\ud83d\udc3e'];

  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.animationDuration = (2 + Math.random() * 3) + 's';
    piece.style.animationDelay = Math.random() * 1.5 + 's';

    if (Math.random() > 0.5) {
      piece.textContent = shapes[Math.floor(Math.random() * shapes.length)];
      piece.style.fontSize = '20px';
      piece.style.background = 'none';
    } else {
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      piece.style.width = (6 + Math.random() * 10) + 'px';
      piece.style.height = (6 + Math.random() * 10) + 'px';
    }

    container.appendChild(piece);
  }

  setTimeout(() => container.remove(), 5000);
}

// ============ RENDERING ============
const app = document.getElementById('app');

function render() {
  const stopId = getStopFromURL();

  if (state.submitted) {
    renderThankYou();
  } else if (stopId) {
    renderStop(stopId);
  } else {
    renderHub();
  }
}

function renderHub() {
  const completed = getCompletedCount();
  const pct = Math.round((completed / TOTAL_STOPS) * 100);
  const allDone = completed >= TOTAL_STOPS;

  let html = `
    <div class="header">
      <span class="bigfoot-icon">\ud83e\uddb6</span>
      <h1>PNW Wilds<br>Market Street Adventure</h1>
      <div class="subtitle">What's Out There? \ud83d\udc40</div>
      <div class="tagline">A Bigfoot Scavenger Hunt \u2022 Downtown Chehalis</div>
    </div>

    <div class="progress-section">
      <div class="progress-label">
        <span>\ud83d\udccd Stops Completed</span>
        <span>${completed} / ${TOTAL_STOPS}</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: ${pct}%">
          ${pct > 8 ? '<span class="footprint">\ud83e\uddb6</span>' : ''}
        </div>
      </div>
    </div>
  `;

  if (allDone) {
    html += `
      <div class="completion-screen">
        <div class="celebration">\ud83c\udf89</div>
        <h2>YOU FOUND BIGFOOT!</h2>
        <p>Amazing work, adventurer! You've completed all ${TOTAL_STOPS} stops on Market Street. Now enter your team info below to be entered into the prize drawing!</p>
      </div>
      ${renderEntryForm()}
    `;
  }

  html += `<div class="hub-grid">`;

  STOPS.forEach(stop => {
    const done = state.completed[stop.id];
    html += `
      <a class="hub-card ${done ? 'completed' : ''}" href="?stop=${stop.id}">
        <span class="hub-icon">${stop.icon}</span>
        <div class="hub-name">${stop.name}</div>
        ${done
          ? '<span class="checkmark">\u2713</span>'
          : '<div class="hub-status pending">Tap to visit!</div>'
        }
      </a>
    `;
  });

  html += `</div>`;

  // Reset button for testing / shared devices
  html += `
    <div style="text-align:center; margin-top: 12px;">
      <button onclick="if(confirm('Reset all progress? This cannot be undone.')){state={completed:{},teamName:'',teamSize:'',submitted:false};saveState();render();}" 
        style="background:none;border:none;color:#ccc;font-size:0.75rem;cursor:pointer;text-decoration:underline;">
        Reset Progress
      </button>
    </div>
  `;

  app.innerHTML = html;

  if (allDone) {
    launchConfetti();
    const form = document.getElementById('entryForm');
    if (form) {
      form.addEventListener('submit', handleSubmit);
    }
  }
}

function renderStop(stopId) {
  const stop = STOPS.find(s => s.id === stopId);
  if (!stop) {
    app.innerHTML = `<div class="header"><h1>Stop not found!</h1><button class="nav-btn" onclick="window.location='?'">\u2190 Back to Map</button></div>`;
    return;
  }

  if (state.completed[stopId]) {
    app.innerHTML = `
      <div class="header">
        <span class="bigfoot-icon">${stop.icon}</span>
        <h1>${stop.name}</h1>
      </div>
      <div class="already-done">
        <div style="font-size:3rem">\u2705</div>
        <h3>Already Completed!</h3>
        <p>You've already conquered this stop, adventurer! Bigfoot is impressed.</p>
        <p style="font-size:0.85rem; color:var(--purple); font-style:italic; margin-top:8px;">${stop.funFact}</p>
        <button class="nav-btn" onclick="window.location='?'">\ud83d\uddfa\ufe0f Back to Adventure Map</button>
      </div>
    `;
    return;
  }

  const letters = ['A', 'B', 'C', 'D'];

  let html = `
    <div class="header" style="padding-bottom:8px">
      <button class="nav-btn" onclick="window.location='?'" style="margin-bottom:12px">\ud83d\uddfa\ufe0f Adventure Map</button>
    </div>
    <div class="stop-card">
      <div class="business-icon">${stop.icon}</div>
      <div class="business-name">${stop.name}</div>
      <div class="business-address">\ud83d\udccd ${stop.address}</div>
      <div class="question-label">\ud83e\uddb6 Bigfoot wants to know...</div>
      <div class="question">${stop.question}</div>
      <div class="options" id="options-${stop.id}">
        ${stop.options.map((opt, i) => `
          <button class="option-btn" data-stop="${stop.id}" data-idx="${i}" onclick="handleAnswer(${stop.id}, ${i})">
            <span class="letter">${letters[i]}</span>
            <span>${opt}</span>
          </button>
        `).join('')}
      </div>
      <div id="result-${stop.id}"></div>
    </div>
  `;

  app.innerHTML = html;
}

function handleAnswer(stopId, selectedIdx) {
  const stop = STOPS.find(s => s.id === stopId);
  const buttons = document.querySelectorAll(`[data-stop="${stopId}"]`);
  const resultDiv = document.getElementById(`result-${stopId}`);

  // Disable all buttons
  buttons.forEach(btn => {
    btn.disabled = true;
    btn.style.pointerEvents = 'none';
  });

  const isCorrect = selectedIdx === stop.correct;

  // Highlight selected
  buttons[selectedIdx].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    buttons[stop.correct].classList.add('correct');
  }

  // Mark as completed regardless of answer (it's for fun!)
  state.completed[stopId] = true;
  saveState();

  if (isCorrect) {
    resultDiv.innerHTML = `
      <div class="result-msg correct">
        \ud83c\udf1f Correct! Bigfoot approves! \ud83e\uddb6
        <div class="fun-fact">${stop.funFact}</div>
      </div>
      <div style="text-align:center">
        <button class="nav-btn" onclick="window.location='?'">\ud83d\uddfa\ufe0f Continue Adventure (${getCompletedCount()}/${TOTAL_STOPS})</button>
      </div>
    `;
    launchConfetti();
  } else {
    resultDiv.innerHTML = `
      <div class="result-msg wrong">
        \ud83d\ude04 Nice try! The answer was <strong>${String.fromCharCode(65 + stop.correct)}</strong> \u2014 but Bigfoot still gives you credit for showing up!
        <div class="fun-fact">${stop.funFact}</div>
      </div>
      <div style="text-align:center">
        <button class="nav-btn" onclick="window.location='?'">\ud83d\uddfa\ufe0f Continue Adventure (${getCompletedCount()}/${TOTAL_STOPS})</button>
      </div>
    `;
  }
}

function renderEntryForm() {
  return `
    <form class="entry-form" id="entryForm">
      <h3>\ud83c\udfc6 Enter the Prize Drawing!</h3>
      <div class="form-group">
        <label for="teamName">\ud83e\uddb6 Team / Your Name</label>
        <input type="text" id="teamName" placeholder="e.g., The Sasquatch Squad" required>
      </div>
      <div class="form-group">
        <label for="teamSize">\ud83d\udc65 Team Size</label>
        <select id="teamSize" required>
          <option value="">Select...</option>
          <option value="1">Just me (solo Squatcher)</option>
          <option value="2">2 adventurers</option>
          <option value="3">3 adventurers</option>

          <option value="5+">5+ (a whole expedition!)</option>
        </select>
      </div>

        <label for="email">\ud83d\udce7 Email (for prize notification)</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label for="phone">\ud83d\udcf1 Phone (optional)</label>
        <input type="tel" id="phone" placeholder="(360) 555-1234">
      </div>
      <div class="form-group">
        <label for="favorite">\u2764\ufe0f Favorite stop on the hunt?</label>
        <select id="favorite">
          <option value="">Pick your fave!</option>
          ${STOPS.map(s => `<option value="${s.name}">${s.icon} ${s.name}</option>`).join('')}
        </select>
      </div>
      <button type="submit" class="submit-btn">\ud83e\uddb6 Submit & Enter Drawing!</button>
    </form>
  `;
}

function handleSubmit(e) {
  e.preventDefault();

  state.teamName = document.getElementById('teamName').value;
  state.teamSize = document.getElementById('teamSize').value;
  state.email = document.getElementById('email').value;
  state.phone = document.getElementById('phone').value || '';
  state.favorite = document.getElementById('favorite').value || '';
  state.completedAt = new Date().toISOString();
  state.submitted = true;
  saveState();

  // Submit to Google Form (if configured)
  if (GOOGLE_FORM_URL) {
    submitToGoogleForm();
  }

  render();
  launchConfetti();
}

function renderThankYou() {
  app.innerHTML = `
    <div class="thankyou">
      <div style="font-size:5rem">\ud83c\udf89\ud83e\uddb6\ud83c\udf89</div>

            \u23f0 Completed: <strong>${new Date().toLocaleTimeString()}</strong>
          </p>
        </div>
      </div>
      <p style="font-size: 0.9rem; color: var(--purple); font-style: italic;">
        Thank you for supporting Nature Nurture Farmacy &amp; Lewis County Historical Museum!
      </p>
      <div style="margin-top: 24px; font-size: 3rem;">\ud83c\udf32\ud83e\uddb6\ud83c\udf32</div>

// Handle back/forward navigation
window.addEventListener('popstate', render);
